{% extends "iomanager_app/manager_base.html" %}
{% load phone_filters %}

{% block title %}현황 | iomanager{% endblock %}

{% block manager_content %}
<div id="admin-status-panel" data-refresh-url="{% url 'iomanager_app:admin_status_panel' %}">
    {% include "iomanager_app/includes/admin_status_panel.html" %}
</div>
<script>
(() => {
    const panel = document.getElementById("admin-status-panel");
    if (!panel) return;

    const refreshUrl = panel.dataset.refreshUrl;
    const refreshIntervalMs = 2000;
    let refreshTimer = null;
    let inFlight = false;

    const scheduleRefresh = (delay = refreshIntervalMs) => {
        window.clearTimeout(refreshTimer);
        refreshTimer = window.setTimeout(refreshPanel, delay);
    };

    const refreshPanel = async () => {
        if (inFlight || document.hidden) {
            scheduleRefresh();
            return;
        }

        inFlight = true;
        try {
            const response = await fetch(refreshUrl, {
                headers: {"X-Requested-With": "XMLHttpRequest"},
            });
            if (!response.ok) {
                throw new Error(`Failed to refresh status panel: ${response.status}`);
            }
            panel.innerHTML = await response.text();
        } catch (error) {
            console.error(error);
        } finally {
            inFlight = false;
            scheduleRefresh();
        }
    };

    document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
            scheduleRefresh(0);
        }
    });

    scheduleRefresh();
})();
</script>
{% endblock %}
