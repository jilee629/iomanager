{% load static %}
<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}iomanager{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
</head>
<body class="bg-light">
    {% block topbar %}
        {% if user.is_authenticated %}
        <header class="bg-light border-bottom">
            <div class="container py-1 d-flex justify-content-end">
                <form method="post" action="{% url 'iomanager_app:logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
                </form>
            </div>
        </header>
        {% endif %}
    {% endblock %}

    <main class="container py-4">
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
