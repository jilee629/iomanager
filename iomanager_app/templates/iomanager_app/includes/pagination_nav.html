{% if page_obj.paginator.num_pages > 1 %}
<nav aria-label="{{ aria_label }}" class="mt-3">
    <ul class="pagination pagination-sm mb-0">
        {% if page_obj.has_previous %}
        <li class="page-item">
            <a class="page-link" href="?q={{ q }}{% if sort %}&sort={{ sort }}{% endif %}{% if sort_by %}&sort_by={{ sort_by }}{% endif %}{% if sort_dir %}&sort_dir={{ sort_dir }}{% endif %}&page_size={{ page_size }}&page={{ page_obj.previous_page_number }}">이전</a>
        </li>
        {% else %}
        <li class="page-item disabled"><span class="page-link">이전</span></li>
        {% endif %}
        <li class="page-item disabled">
            <span class="page-link">{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
        </li>
        {% if page_obj.has_next %}
        <li class="page-item">
            <a class="page-link" href="?q={{ q }}{% if sort %}&sort={{ sort }}{% endif %}{% if sort_by %}&sort_by={{ sort_by }}{% endif %}{% if sort_dir %}&sort_dir={{ sort_dir }}{% endif %}&page_size={{ page_size }}&page={{ page_obj.next_page_number }}">다음</a>
        </li>
        {% else %}
        <li class="page-item disabled"><span class="page-link">다음</span></li>
        {% endif %}
    </ul>
</nav>
{% endif %}
