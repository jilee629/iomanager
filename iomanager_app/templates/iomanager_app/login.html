{% extends "iomanager_app/base.html" %}

{% block title %}로그인 | iomanager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3 text-center">iomanager 로그인</h1>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">아이디</label>
                        <input type="text" name="username" autofocus required class="form-control" id="id_username">
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">비밀번호</label>
                        <input type="password" name="password" required class="form-control" id="id_password">
                    </div>
                    {% if form.errors %}
                    <div class="alert alert-danger" role="alert">
                        로그인 정보가 올바르지 않습니다.
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary w-100">로그인</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
